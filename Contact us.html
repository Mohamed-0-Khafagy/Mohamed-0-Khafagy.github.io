    <h2>Please fill out the form so we can review your Message</h2>
    <hr>
    <form id="form2">
        <label for="Firstname">First name:</label>
        <input type="text" id="Firstname" placeholder="Your First Name.." required>
        <br><br>
        <label for="Secondname">Second name:</label>
        <input type="text" id="Secondname" placeholder="Your Second Name.." required>
        <br><br>
        <label for="Phonenumber">Phone number:</label>
        <input type="tel" id="Phonenumber" placeholder="01234567890" minlength="11" maxlength="11" required >
        <br><br>
        <label for="Email">Email:</label>
        <input type="email" id="Email" placeholder="CR7@gmail.com" required>
        <br><br>
        <label for="Message">Your Message:</label>
        <br>
        <textarea id="Message" placeholder="Write here your Message" rows="8" cols="25"></textarea>
        <br><br>
        <input id="reset-1" type="reset">
        <br><br>
        <input id="submit-1" type="submit">
    </form>
